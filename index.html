<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach Tools" />
  <meta name="theme-color" content="#080d1a" />
  <title>Coach's Toolbox · Steve Barbour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32"   href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180"      href="icon-192.png" />
  <link rel="shortcut icon"                          href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #080d1a; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    body { overscroll-behavior: none; }
    /* Push all page content below the iOS status bar when running as a home screen app */
    #root { padding-top: env(safe-area-inset-top); }
    select option { background: #0f1623; color: #e2e8f0; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    #offline-banner { display: none; position: fixed; top: 0; left: 0; right: 0; background: #fbbf24; color: #080d1a; text-align: center; font-size: 12px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 1px; padding: 6px; z-index: 9999; }
    .ring-bg { fill: none; stroke: #1e2d45; }
    .ring-fg { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.25s linear; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: flex-end; }
    .modal-sheet { background: #0f1623; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; border-top: 1px solid #1e2d45; }
  </style>
</head>
<body>
<div id="offline-banner">OFFLINE MODE — all tools still working</div>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ─── Theme ────────────────────────────────────────────────────────────────────
const th = {
  bg:"#080d1a", surface:"#0f1623", surfaceAlt:"#141d2e", border:"#1e2d45",
  accent:"#38bdf8", accentDim:"#0c2a3e",
  gold:"#fbbf24", goldDim:"#2a1f00",
  purple:"#c084fc", purpleDim:"#1a0d2e",
  green:"#4ade80", greenDim:"#0a2010",
  orange:"#fb923c", orangeDim:"#2a1000",
  red:"#f87171", text:"#e2e8f0", muted:"#64748b", dim:"#94a3b8",
  font:"'Montserrat', sans-serif",
};

// ─── Styles ───────────────────────────────────────────────────────────────────
const S = {
  page: { minHeight:"100dvh", background:th.bg, color:th.text, fontFamily:th.font, padding:"0.75rem 1.25rem 3rem", maxWidth:520, margin:"0 auto" },
  input: { flex:1, background:th.surface, border:`1px solid ${th.border}`, borderRadius:8, color:th.text, padding:"10px 12px", fontSize:15, fontFamily:"inherit", fontWeight:500, outline:"none", WebkitAppearance:"none" },
  primaryBtn: (bg=th.accent, fg=th.bg) => ({ width:"100%", padding:"14px", background:bg, color:fg, border:"none", borderRadius:10, fontSize:15, fontWeight:700, fontFamily:"inherit", cursor:"pointer" }),
  outlineBtn: (color=th.accent) => ({ padding:"10px 16px", background:"none", color, border:`1px solid ${color}`, borderRadius:8, fontSize:13, fontWeight:600, fontFamily:"inherit", cursor:"pointer" }),
  ghostBtn: { width:"100%", padding:"12px", background:"none", color:th.accent, border:`1px dashed ${th.border}`, borderRadius:10, fontSize:13, fontFamily:"inherit", cursor:"pointer" },
  card: (on=false, color=th.green) => ({ background:on?color+"18":th.surface, border:`1px solid ${on?color:th.border}`, borderRadius:12, padding:"12px 14px", marginBottom:8 }),
  splitBox: { background:th.bg, border:`1px solid ${th.border}`, borderRadius:8, padding:"6px 12px", minWidth:82 },
  lbl: (c=th.muted) => ({ fontSize:9, letterSpacing:2.5, textTransform:"uppercase", color:c, marginBottom:2, fontWeight:600 }),
  backBtn: { background:"none", border:"none", color:th.muted, fontSize:13, cursor:"pointer", marginBottom:20, padding:0, fontFamily:"inherit", fontWeight:500, display:"block" },
  head: (c=th.accent) => ({ fontSize:10, letterSpacing:4, color:c, textTransform:"uppercase", marginBottom:4, fontWeight:700 }),
  title: { fontSize:26, fontWeight:800, color:"#fff", marginTop:4, marginBottom:6 },
  sub: { fontSize:12, color:th.muted, lineHeight:1.6 },
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const pad = n => String(Math.floor(Math.abs(n))).padStart(2,"0");
const fmtMs = ms => {
  if (ms==null) return "--:--.--";
  const s=ms/1000, m=Math.floor(s/60);
  return `${m>0?m+":":""}${pad(s%60)}.${pad((ms%1000)/10)}`;
};
const fmtSec = s => {
  if (s==null||isNaN(s)||s<0) return "--:--";
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
  return h>0?`${h}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;
};
const parseDur = str => {
  if (!str) return null;
  str=str.trim();
  if (str.includes(":")) { const [a,b]=str.split(":").map(Number); return isNaN(a)||isNaN(b)?null:a*60+b; }
  const n=Number(str); return isNaN(n)?null:n;
};
const parseTime = str => {
  if (!str) return null;
  const p=str.trim().split(":").map(Number);
  if (p.some(isNaN)) return null;
  if (p.length===3) return p[0]*3600+p[1]*60+p[2];
  if (p.length===2) return p[0]*60+p[1];
  return p[0];
};
const nowISO  = () => new Date().toISOString();
const fmtDate = iso => { try { return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); } catch(e) { return iso; } };
const uid     = () => Math.random().toString(36).slice(2,10);

// iOS-safe audio
let actx=null;
const beep = (freq=880,dur=0.15,vol=0.4) => {
  try {
    if (!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if (actx.state==="suspended") actx.resume();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  } catch(e) {}
};
const beepEnd   = () => { beep(660,0.12); setTimeout(()=>beep(880,0.2),160); };
const beepStart = () => { beep(1100,0.18); };

// ─── localStorage persistence ─────────────────────────────────────────────────
const LS = {
  get: (key, def) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch(e) { return def; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} },
};

// ─── Athlete store (global, shared across tools) ──────────────────────────────
// Athlete shape: { id, name, group, createdAt }
// History entry: { id, tool, date, data:{} }
const useAthletes = () => {
  const [athletes, setAthletesRaw] = useState(() => LS.get("ct_athletes", []));
  const setAthletes = v => { const next = typeof v==="function"?v(athletes):v; LS.set("ct_athletes",next); setAthletesRaw(next); };

  const addAthlete    = (name, group="") => { const a={id:uid(),name:name.trim(),group:group.trim(),createdAt:nowISO()}; setAthletes(p=>[...p,a]); return a; };
  const updateAthlete = (id, fields)     => setAthletes(p=>p.map(a=>a.id===id?{...a,...fields}:a));
  const deleteAthlete = id               => { setAthletes(p=>p.filter(a=>a.id!==id)); LS.set(`ct_hist_${id}`,[]);};

  const saveResult = (athleteId, tool, data) => {
    const entry = { id:uid(), tool, date:nowISO(), data };
    const hist   = LS.get(`ct_hist_${athleteId}`,[]);
    LS.set(`ct_hist_${athleteId}`, [entry,...hist].slice(0,50)); // keep last 50
  };
  const getHistory = athleteId => LS.get(`ct_hist_${athleteId}`,[]);

  return { athletes, addAthlete, updateAthlete, deleteAthlete, saveResult, getHistory };
};

// ─── Athlete Picker (used inside tools) ──────────────────────────────────────
// Shows a dropdown of saved athletes + "New athlete" text input fallback
function AthletePicker({ athletes, value, onChange, placeholder="Athlete name" }) {
  const [mode, setMode] = useState(value?.id ? "saved" : "new");
  const [newName, setNewName] = useState(value?.name||"");

  useEffect(() => {
    if (mode==="new") onChange({ id:null, name:newName });
  }, [newName, mode]);

  if (athletes.length===0) {
    return (
      <input value={newName} onChange={e=>{setNewName(e.target.value);}} placeholder={placeholder} style={S.input}/>
    );
  }

  return (
    <div style={{display:"flex",gap:6,flex:1}}>
      {mode==="saved" ? (
        <select value={value?.id||""} onChange={e=>{
          if (e.target.value==="__new") { setMode("new"); onChange({id:null,name:""}); }
          else { const a=athletes.find(x=>x.id===e.target.value); onChange(a||{id:null,name:""}); }
        }} style={{...S.input,flex:1}}>
          <option value="">Select athlete…</option>
          {athletes.map(a=><option key={a.id} value={a.id}>{a.name}{a.group?` (${a.group})`:""}</option>)}
          <option value="__new">+ New athlete…</option>
        </select>
      ) : (
        <>
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder={placeholder} style={{...S.input,flex:1}}/>
          <button onClick={()=>{setMode("saved");onChange({id:null,name:""});}} style={{...S.outlineBtn(th.muted),padding:"8px 10px",fontSize:11,flexShrink:0}}>↩ List</button>
        </>
      )}
    </div>
  );
}

// ─── Share helper ─────────────────────────────────────────────────────────────
const shareOrCopy = async (text, title="Result") => {
  if (navigator.share) {
    try { await navigator.share({title, text}); return; } catch(e) {}
  }
  try { await navigator.clipboard.writeText(text); alert("Copied to clipboard!"); } catch(e) { alert(text); }
};

// ─── Tool registry ────────────────────────────────────────────────────────────
const TOOLS = [
  { id:"css",      name:"CSS Timer",       subtitle:"Critical Swim Speed test",    icon:"🏊", color:th.accent },
  { id:"tt",       name:"Time Trial",      subtitle:"Staggered start TT timer",    icon:"⏱", color:th.purple },
  { id:"pace",     name:"Pace Calculator", subtitle:"Swim / bike / run paces",     icon:"📐", color:th.gold   },
  { id:"interval", name:"Interval Timer",  subtitle:"Work / rest session builder", icon:"🕐", color:th.green  },
  { id:"brick",    name:"Brick Logger",    subtitle:"T1 / T2 transition times",    icon:"🚴", color:th.orange },
];

// ═══════════════════════════════════════════════════════════════════════════════
// SCREEN: Athlete Profiles
// ═══════════════════════════════════════════════════════════════════════════════
function AthletesScreen({ onBack, store }) {
  const { athletes, addAthlete, updateAthlete, deleteAthlete, getHistory } = store;
  const [view, setView]     = useState("list"); // list | add | detail
  const [selected, setSelected] = useState(null);
  const [newName, setNewName]   = useState("");
  const [newGroup, setNewGroup] = useState("");
  const [editMode, setEditMode] = useState(false);
  const [editName, setEditName] = useState("");
  const [editGroup, setEditGroup]= useState("");

  const TOOL_LABELS = { css:"CSS Timer", brick:"Brick Logger", pace:"Pace Calculator", interval:"Interval Timer", tt:"Time Trial" };
  const TOOL_COLORS = { css:th.accent,   brick:th.orange,       pace:th.gold,           interval:th.green,         tt:th.purple };

  const formatResult = (entry) => {
    const d = entry.data;
    if (entry.tool==="css")   return `400m: ${fmtMs(d.t400)} · 200m: ${fmtMs(d.t200)}${d.css?" · CSS: "+d.css:""}`;
    if (entry.tool==="brick") return `T1: ${fmtMs(d.t1)} · T2: ${fmtMs(d.t2)}${d.t1&&d.t2?" · Total: "+fmtMs(d.t1+d.t2):""}`;
    if (entry.tool==="tt")    return `${d.disc?d.disc.charAt(0).toUpperCase()+d.disc.slice(1):""} ${d.dist||""}${d.unit||""} · ${fmtMs(d.timeMs)}${d.pace?" · "+d.pace:""}`;
    return JSON.stringify(d);
  };

  const shareAthlete = (a) => {
    const hist = getHistory(a.id);
    if (!hist.length) { shareOrCopy(`${a.name} — no results yet`, a.name); return; }
    const lines = [`📊 ${a.name}${a.group?" ("+a.group+")":""}`, `Coach's Toolbox · tools.stevebarbour.com`, ""];
    hist.slice(0,10).forEach(e => lines.push(`${fmtDate(e.date)} · ${TOOL_LABELS[e.tool]||e.tool}`, formatResult(e), ""));
    shareOrCopy(lines.join("\n"), a.name);
  };

  if (view==="add") return (
    <div style={S.page}>
      <button onClick={()=>setView("list")} style={S.backBtn}>← Athletes</button>
      <div style={S.head()}>Athletes</div>
      <div style={S.title}>New Athlete</div>
      <div style={{...S.sub,marginBottom:24}}>Name is required. Group is optional (e.g. Masters, Junior)</div>
      <div style={{...S.lbl(),marginBottom:6}}>Name</div>
      <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Full name" style={{...S.input,display:"block",width:"100%",marginBottom:14}}/>
      <div style={{...S.lbl(),marginBottom:6}}>Group / Tag</div>
      <input value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="e.g. Elite, Junior, Masters" style={{...S.input,display:"block",width:"100%",marginBottom:24}}/>
      <button onClick={()=>{ if(!newName.trim()) return; addAthlete(newName,newGroup); setNewName(""); setNewGroup(""); setView("list"); }}
        disabled={!newName.trim()} style={{...S.primaryBtn(),opacity:newName.trim()?1:0.4}}>Save Athlete</button>
    </div>
  );

  if (view==="detail" && selected) {
    const hist = getHistory(selected.id);
    return (
      <div style={S.page}>
        <button onClick={()=>{setView("list");setSelected(null);setEditMode(false);}} style={S.backBtn}>← Athletes</button>
        <div style={S.head()}>Athlete Profile</div>
        {editMode ? (
          <>
            <input value={editName} onChange={e=>setEditName(e.target.value)} style={{...S.input,display:"block",width:"100%",marginBottom:10,fontSize:20,fontWeight:700}}/>
            <input value={editGroup} onChange={e=>setEditGroup(e.target.value)} placeholder="Group / Tag" style={{...S.input,display:"block",width:"100%",marginBottom:16}}/>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              <button onClick={()=>{ updateAthlete(selected.id,{name:editName,group:editGroup}); setSelected(a=>({...a,name:editName,group:editGroup})); setEditMode(false); }}
                style={{...S.primaryBtn(),flex:1}}>Save</button>
              <button onClick={()=>setEditMode(false)} style={{...S.outlineBtn(th.muted),flex:1}}>Cancel</button>
            </div>
          </>
        ) : (
          <div style={{marginBottom:20}}>
            <div style={S.title}>{selected.name}</div>
            {selected.group && <div style={{fontSize:12,color:th.accent,fontWeight:600,marginBottom:4}}>{selected.group}</div>}
            <div style={{fontSize:11,color:th.muted}}>Member since {fmtDate(selected.createdAt)}</div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={()=>{setEditName(selected.name);setEditGroup(selected.group||"");setEditMode(true);}} style={{...S.outlineBtn(),fontSize:12,padding:"8px 14px"}}>✏️ Edit</button>
              <button onClick={()=>shareAthlete(selected)} style={{...S.outlineBtn(th.purple),fontSize:12,padding:"8px 14px"}}>↗ Share</button>
              <button onClick={()=>{ if(confirm(`Delete ${selected.name}? This will remove all their results.`)) { deleteAthlete(selected.id); setView("list"); setSelected(null); }}}
                style={{...S.outlineBtn(th.red),fontSize:12,padding:"8px 14px"}}>🗑 Delete</button>
            </div>
          </div>
        )}

        <div style={{...S.lbl(),marginBottom:10}}>Result History ({hist.length})</div>
        {hist.length===0 && <div style={{fontSize:13,color:th.muted,padding:"16px 0"}}>No results yet — use the tools to log sessions.</div>}
        {hist.map(entry=>(
          <div key={entry.id} style={{background:th.surface,border:`1px solid ${th.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,color:TOOL_COLORS[entry.tool]||th.accent}}>{TOOL_LABELS[entry.tool]||entry.tool}</span>
              <span style={{fontSize:10,color:th.muted}}>{fmtDate(entry.date)}</span>
            </div>
            <div style={{fontSize:13,fontVariantNumeric:"tabular-nums",fontWeight:500}}>{formatResult(entry)}</div>
            <button onClick={()=>{
              const lines=[`${selected.name} · ${TOOL_LABELS[entry.tool]}`,`${fmtDate(entry.date)}`,formatResult(entry),"","Coach's Toolbox · tools.stevebarbour.com"];
              shareOrCopy(lines.join("\n"), `${selected.name} result`);
            }} style={{marginTop:8,background:"none",border:"none",color:th.accent,fontSize:11,cursor:"pointer",fontFamily:"inherit",padding:0,fontWeight:600}}>
              ↗ Share this result
            </button>
          </div>
        ))}
      </div>
    );
  }

  // List view
  const groups = [...new Set(athletes.map(a=>a.group||"").filter(Boolean))].sort();
  const ungrouped = athletes.filter(a=>!a.group);

  const AthleteRow = ({a}) => (
    <button onClick={()=>{setSelected(a);setView("detail");}} style={{width:"100%",background:th.surface,border:`1px solid ${th.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,textAlign:"left",fontFamily:"inherit",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontWeight:700,fontSize:14,color:th.text}}>{a.name}</div>
        {a.group&&<div style={{fontSize:11,color:th.accent,marginTop:2}}>{a.group}</div>}
      </div>
      <div style={{fontSize:11,color:th.muted}}>{getHistory(a.id).length} results ›</div>
    </button>
  );

  return (
    <div style={S.page}>
      <button onClick={onBack} style={S.backBtn}>← Toolbox</button>
      <div style={S.head()}>Coach's Toolbox</div>
      <div style={S.title}>Athletes</div>
      <div style={{...S.sub,marginBottom:24}}>Save athletes to track results over time</div>

      {athletes.length===0 ? (
        <div style={{textAlign:"center",padding:"40px 0 30px"}}>
          <div style={{fontSize:36,marginBottom:12}}>👤</div>
          <div style={{fontSize:14,color:th.muted,marginBottom:24}}>No athletes saved yet.<br/>Add your first athlete to start tracking.</div>
        </div>
      ) : (
        <>
          {groups.map(g=>(
            <div key={g} style={{marginBottom:16}}>
              <div style={{...S.lbl(th.accent),marginBottom:8}}>{g}</div>
              {athletes.filter(a=>a.group===g).map(a=><AthleteRow key={a.id} a={a}/>)}
            </div>
          ))}
          {ungrouped.length>0&&(
            <div style={{marginBottom:16}}>
              {groups.length>0&&<div style={{...S.lbl(),marginBottom:8}}>Other</div>}
              {ungrouped.map(a=><AthleteRow key={a.id} a={a}/>)}
            </div>
          )}
        </>
      )}
      <button onClick={()=>setView("add")} style={S.primaryBtn()}>+ Add Athlete</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCREEN: Home
// ═══════════════════════════════════════════════════════════════════════════════
function HomeScreen({ onLaunch, onAthletes, store }) {
  const { athletes } = store;
  return (
    <div style={S.page}>
      <div style={{marginBottom:24,paddingTop:8}}>
        <div style={S.head()}>Coach's Toolbox</div>
        <div style={S.title}>Triathlon<br/>Session Tools</div>
        <div style={S.sub}>Everything you need poolside &amp; trackside</div>
      </div>

      {/* Athletes card */}
      <button onClick={onAthletes} style={{width:"100%",background:th.surface,border:`1px solid ${th.border}`,borderRadius:14,padding:"14px 16px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>👤</span>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:th.accent}}>Athletes</div>
            <div style={{fontSize:11,color:th.muted,marginTop:2}}>Profiles &amp; result history</div>
          </div>
        </div>
        <div style={{fontSize:12,color:th.muted}}>{athletes.length} saved ›</div>
      </button>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        {TOOLS.map(t=>(
          <button key={t.id} onClick={()=>onLaunch(t.id)} style={{background:th.surface,border:`1px solid ${th.border}`,borderRadius:14,padding:"18px 14px",textAlign:"left",cursor:"pointer",fontFamily:"inherit"}}>
            <div style={{fontSize:26,marginBottom:10}}>{t.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:t.color,marginBottom:4}}>{t.name}</div>
            <div style={{fontSize:11,color:th.muted,lineHeight:1.5}}>{t.subtitle}</div>
          </button>
        ))}
      </div>

      <div style={{marginTop:14,padding:"14px 16px",background:th.surface,borderRadius:12,border:`1px solid ${th.border}`}}>
        <div style={S.lbl()}>stevebarbour.com</div>
        <div style={{fontSize:12,color:th.dim,marginBottom:10,marginTop:2}}>Coach's Toolbox · v3.0</div>
        <a href="https://www.stevebarbour.com/coaching" target="_blank" rel="noopener noreferrer"
          style={{fontSize:12,color:th.accent,textDecoration:"none",fontWeight:600}}>
          Triathlon coaching by Steve Barbour →
        </a>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOL 1 — CSS TIMER (with athlete profiles + save + share)
// ═══════════════════════════════════════════════════════════════════════════════
function CSSTimer({ onBack, store }) {
  const { athletes, addAthlete, saveResult } = store;

  // Each session row: { uid, athlete:{id,name}, s400,f400,s200,f200 }
  const [rows, setRows]     = useState([{ uid:uid(), athlete:{id:null,name:""} }]);
  const [phase, setPhase]   = useState("setup");
  const [saved, setSaved]   = useState({});
  const wallRef=useRef(null), ticker=useRef(null);
  const [now, setNow]       = useState(null);
  const elapsed = () => now&&wallRef.current ? now-wallRef.current : 0;

  const addRow    = () => setRows(p=>[...p,{uid:uid(),athlete:{id:null,name:""}}]);
  const removeRow = u => setRows(p=>p.filter(r=>r.uid!==u));
  const setAthlete= (u,a)=>setRows(p=>p.map(r=>r.uid===u?{...r,athlete:a}:r));

  const startSession = () => {
    wallRef.current=performance.now();
    ticker.current=setInterval(()=>setNow(performance.now()),50);
    setPhase("racing");
  };
  const endSession = () => { clearInterval(ticker.current); setPhase("results"); };
  const reset      = () => { clearInterval(ticker.current); setRows([{uid:uid(),athlete:{id:null,name:""}}]); setNow(null); wallRef.current=null; setSaved({}); setPhase("setup"); };

  const mark = (u,key) => setRows(p=>p.map(r=>r.uid===u?{...r,[key]:elapsed()}:r));
  const getDerived = r => ({ t400:r.s400!=null&&r.f400!=null?r.f400-r.s400:null, t200:r.s200!=null&&r.f200!=null?r.f200-r.s200:null });
  const calcCSS = (t4,t2) => { if(!t4||!t2) return null; const s=(t4-t2)/1000/2; return s>0?`${pad(Math.floor(s/60))}:${pad(s%60)} /100m`:null; };

  const ready = rows.length>0&&rows.every(r=>r.athlete?.name?.trim());
  const aBtn  = (fg,bg,solid)=>({padding:"8px 16px",background:solid?fg:bg,color:solid?th.bg:fg,border:`1px solid ${fg}`,borderRadius:8,fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",flexShrink:0});

  const doSave = (r) => {
    const d = getDerived(r);
    const css = calcCSS(d.t400, d.t200);
    // If this is a saved athlete, persist
    let aId = r.athlete.id;
    if (!aId && r.athlete.name?.trim()) {
      // auto-create athlete if typed a name
      const created = addAthlete(r.athlete.name);
      aId = created.id;
    }
    if (aId) saveResult(aId, "css", { t400:d.t400, t200:d.t200, css });
    setSaved(p=>({...p,[r.uid]:true}));
  };

  const doShare = (r) => {
    const d = getDerived(r);
    const css = calcCSS(d.t400,d.t200);
    const lines = [
      `🏊 CSS Test — ${r.athlete.name}`,
      `400m: ${fmtMs(d.t400)}`,
      `200m: ${fmtMs(d.t200)}`,
      css?`CSS Pace: ${css}`:"CSS: incomplete",
      "",
      `Coach's Toolbox · tools.stevebarbour.com`,
    ];
    shareOrCopy(lines.join("\n"), `${r.athlete.name} CSS Result`);
  };

  if (phase==="setup") return (
    <div style={S.page}>
      <button onClick={onBack} style={S.backBtn}>← Toolbox</button>
      <div style={S.head()}>Critical Swim Speed</div>
      <div style={S.title}>CSS Timer</div>
      <div style={{...S.sub,marginBottom:24}}>400m effort · rest · 200m effort<br/>Independent start/stop per athlete</div>
      <div style={{...S.lbl(),marginBottom:10}}>Athletes</div>
      {rows.map(r=>(
        <div key={r.uid} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <AthletePicker athletes={athletes} value={r.athlete} onChange={a=>setAthlete(r.uid,a)} placeholder="Athlete name"/>
          {rows.length>1&&<button onClick={()=>removeRow(r.uid)} style={{background:"none",border:"none",color:th.red,fontSize:20,cursor:"pointer",padding:"0 4px",fontFamily:"inherit"}}>×</button>}
        </div>
      ))}
      <button onClick={addRow} style={{...S.ghostBtn,marginBottom:20}}>+ Add Athlete</button>
      <button onClick={startSession} disabled={!ready} style={{...S.primaryBtn(),opacity:ready?1:0.4}}>Start Session</button>
    </div>
  );

  if (phase==="racing") return (
    <div style={S.page}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={S.head()}>Session Live</div>
        <div style={{fontSize:44,fontVariantNumeric:"tabular-nums",color:th.accent,fontWeight:800,lineHeight:1}}>{fmtMs(elapsed())}</div>
      </div>
      {rows.map(r=>{
        const d=getDerived(r);
        const done400=d.t400!=null, done200=d.t200!=null, done=done400&&done200;
        const ph4=!r.s400?"start":!r.f400?"stop":"done";
        const ph2=!done400?"locked":!r.s200?"start":!r.f200?"stop":"done";
        return (
          <div key={r.uid} style={S.card(done,th.green)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:15}}>{r.athlete.name}</span>
              {done&&<span style={{fontSize:10,color:th.green,letterSpacing:2,fontWeight:700}}>DONE ✓</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
              <div style={{fontSize:10,color:th.gold,letterSpacing:2,width:34,flexShrink:0,fontWeight:600}}>400m</div>
              {ph4==="start"&&<button onClick={()=>mark(r.uid,"s400")} style={aBtn(th.gold,th.goldDim,false)}>▶ START</button>}
              {ph4==="stop" &&<><button onClick={()=>mark(r.uid,"f400")} style={aBtn(th.gold,th.goldDim,true)}>■ STOP</button>
                <span style={{fontSize:18,fontVariantNumeric:"tabular-nums",color:th.gold,fontWeight:800}}>{fmtMs(elapsed()-r.s400)}</span></>}
              {ph4==="done" &&<span style={{fontSize:15,fontVariantNumeric:"tabular-nums",color:th.gold,fontWeight:700}}>{fmtMs(d.t400)}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:10,color:th.purple,letterSpacing:2,width:34,flexShrink:0,fontWeight:600}}>200m</div>
              {ph2==="locked"&&<span style={{fontSize:11,color:th.muted}}>after 400m</span>}
              {ph2==="start" &&<button onClick={()=>mark(r.uid,"s200")} style={aBtn(th.purple,th.purpleDim,false)}>▶ START</button>}
              {ph2==="stop"  &&<><button onClick={()=>mark(r.uid,"f200")} style={aBtn(th.purple,th.purpleDim,true)}>■ STOP</button>
                <span style={{fontSize:18,fontVariantNumeric:"tabular-nums",color:th.purple,fontWeight:800}}>{fmtMs(elapsed()-r.s200)}</span></>}
              {ph2==="done"  &&<span style={{fontSize:15,fontVariantNumeric:"tabular-nums",color:th.purple,fontWeight:700}}>{fmtMs(d.t200)}</span>}
            </div>
          </div>
        );
      })}
      <button onClick={endSession} style={{...S.primaryBtn(th.surfaceAlt,th.accent),border:`1px solid ${th.accent}`,marginTop:4}}>View Results</button>
    </div>
  );

  // Results
  return (
    <div style={S.page}>
      <div style={S.head()}>Results</div>
      <div style={{...S.title,marginBottom:20}}>CSS Test</div>
      {rows.map(r=>{
        const d=getDerived(r), css=calcCSS(d.t400,d.t200);
        return (
          <div key={r.uid} style={{background:th.surface,border:`1px solid ${th.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>{r.athlete.name}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {[["400m",fmtMs(d.t400),th.gold],["200m",fmtMs(d.t200),th.purple]].map(([l,v,c])=>(
                <div key={l} style={S.splitBox}><div style={S.lbl(c)}>{l}</div><div style={{fontVariantNumeric:"tabular-nums",fontSize:15,fontWeight:600}}>{v}</div></div>
              ))}
              <div style={{...S.splitBox,borderColor:css?th.accent:th.border}}>
                <div style={S.lbl(css?th.accent:th.muted)}>CSS /100m</div>
                <div style={{fontVariantNumeric:"tabular-nums",fontSize:15,color:css?th.accent:th.muted,fontWeight:700}}>{css??"—"}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>doSave(r)} disabled={saved[r.uid]}
                style={{...S.outlineBtn(saved[r.uid]?th.green:th.accent),flex:1,fontSize:12,padding:"8px 10px"}}>
                {saved[r.uid]?"✓ Saved":"💾 Save to profile"}
              </button>
              <button onClick={()=>doShare(r)} style={{...S.outlineBtn(th.purple),flex:1,fontSize:12,padding:"8px 10px"}}>↗ Share</button>
            </div>
          </div>
        );
      })}
      <div style={{display:"flex",gap:8,marginTop:20}}>
        <button onClick={reset}  style={{...S.outlineBtn(),flex:1}}>↩ New Session</button>
        <button onClick={onBack} style={{...S.outlineBtn(th.muted),flex:1}}>⌂ Toolbox</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOL 2 — PACE CALCULATOR (unchanged, no profile saving needed)
// ═══════════════════════════════════════════════════════════════════════════════
const DISCS = [
  { id:"swim", label:"Swim", paceUnits:["100m","100yd"], distUnits:["m","yd"],  distDef:"400",  eg:"6:40"    },
  { id:"bike", label:"Bike", paceUnits:["km/h","mph"],   distUnits:["km","mi"], distDef:"40",   eg:"1:15:00" },
  { id:"run",  label:"Run",  paceUnits:["/km","/mile"],  distUnits:["km","mi"], distDef:"10",   eg:"50:00"   },
];

function PaceCalculator({ onBack }) {
  const [disc,setDisc]     = useState("swim");
  const [mode,setMode]     = useState("t2p");
  const [distV,setDistV]   = useState("400");
  const [distU,setDistU]   = useState(0);
  const [timeV,setTimeV]   = useState("");
  const [paceV,setPaceV]   = useState("");
  const [result,setResult] = useState(null);
  const d = DISCS.find(x=>x.id===disc);

  useEffect(()=>{ setDistV(d.distDef); setDistU(0); setTimeV(""); setPaceV(""); setResult(null); },[disc]);

  const calc = () => {
    const dist=parseFloat(distV);
    if (!dist||dist<=0) return setResult({err:"Enter a valid distance"});
    if (mode==="t2p") {
      const ts=parseTime(timeV);
      if (!ts) return setResult({err:`Enter time as mm:ss or h:mm:ss (e.g. ${d.eg})`});
      if (disc==="swim") { const pace=ts/(dist/100); setResult({rows:[{l:`Pace per ${d.paceUnits[distU]}`,v:fmtSec(pace)},{l:"Total time",v:fmtSec(ts)}]}); }
      else if (disc==="bike") { const spd=dist/(ts/3600); setResult({rows:[{l:`Speed (${d.paceUnits[distU]})`,v:spd.toFixed(1)},{l:"Total time",v:fmtSec(ts)}]}); }
      else { const pace=ts/dist; setResult({rows:[{l:`Pace (${d.paceUnits[distU]})`,v:fmtSec(pace)},{l:"Total time",v:fmtSec(ts)}]}); }
    } else {
      if (disc==="bike") { const spd=parseFloat(paceV); if(!spd) return setResult({err:"Enter speed e.g. 35"}); setResult({rows:[{l:"Finish time",v:fmtSec((dist/spd)*3600)},{l:`At ${spd} ${d.paceUnits[distU]}`,v:""}]}); }
      else { const ps=parseDur(paceV); if(!ps) return setResult({err:"Enter pace as mm:ss e.g. 1:45"}); const mult=disc==="swim"?dist/100:dist; setResult({rows:[{l:"Finish time",v:fmtSec(ps*mult)},{l:`At ${fmtSec(ps)} ${d.paceUnits[distU]}`,v:""}]}); }
    }
  };

  const shareResult = () => {
    if (!result||result.err) return;
    const lines=[`📐 Pace Calculator`,result.rows.filter(r=>r.v).map(r=>`${r.l}: ${r.v}`).join("\n"),"","Coach's Toolbox · tools.stevebarbour.com"];
    shareOrCopy(lines.join("\n"),"Pace Result");
  };

  const tab=(active,label,onClick,color=th.gold)=>(
    <button onClick={onClick} style={{flex:1,padding:"9px 0",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",borderRadius:8,background:active?color:"none",color:active?th.bg:th.muted,border:active?"none":`1px solid ${th.border}`}}>{label}</button>
  );

  return (
    <div style={S.page}>
      <button onClick={onBack} style={S.backBtn}>← Toolbox</button>
      <div style={S.head(th.gold)}>Coach's Toolbox</div>
      <div style={S.title}>Pace Calculator</div>
      <div style={{...S.sub,marginBottom:24}}>Convert time to pace, or pace to finish time</div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {DISCS.map(di=>tab(disc===di.id,di.label,()=>setDisc(di.id)))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {tab(mode==="t2p","Time → Pace",()=>{setMode("t2p");setResult(null);})}
        {tab(mode==="p2t",disc==="bike"?"Speed → Time":"Pace → Time",()=>{setMode("p2t");setResult(null);})}
      </div>
      <div style={{...S.lbl(),marginBottom:6}}>Distance</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <input type="number" value={distV} onChange={e=>setDistV(e.target.value)} placeholder={d.distDef} style={{...S.input,maxWidth:120}}/>
        <select value={distU} onChange={e=>setDistU(+e.target.value)} style={{...S.input,flex:"none",width:80}}>
          {d.distUnits.map((u,i)=><option key={u} value={i}>{u}</option>)}
        </select>
      </div>
      {mode==="t2p"?<>
        <div style={{...S.lbl(),marginBottom:6}}>Time (e.g. {d.eg})</div>
        <input value={timeV} onChange={e=>{setTimeV(e.target.value);setResult(null);}} placeholder={d.eg} style={{...S.input,marginBottom:20,display:"block",width:"100%"}}/>
      </>:<>
        <div style={{...S.lbl(),marginBottom:6}}>{disc==="bike"?`Speed (${d.paceUnits[distU]})`:disc==="swim"?`Pace per ${d.paceUnits[distU]} (mm:ss)`:`Pace ${d.paceUnits[distU]} (mm:ss)`}</div>
        <input value={paceV} onChange={e=>{setPaceV(e.target.value);setResult(null);}} placeholder={disc==="bike"?"35":"1:45"} style={{...S.input,marginBottom:20,display:"block",width:"100%"}}/>
      </>}
      <button onClick={calc} style={S.primaryBtn(th.gold,th.bg)}>Calculate</button>
      {result&&(
        <div style={{marginTop:20,background:th.surface,borderRadius:12,border:`1px solid ${th.border}`,padding:"16px"}}>
          {result.err?<div style={{color:th.red,fontSize:13,fontWeight:600}}>{result.err}</div>
          :result.rows.filter(r=>r.v).map((r,i,arr)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:i<arr.length-1?10:0,marginBottom:i<arr.length-1?10:0,borderBottom:i<arr.length-1?`1px solid ${th.border}`:"none"}}>
              <div style={{fontSize:12,color:th.muted,fontWeight:500}}>{r.l}</div>
              <div style={{fontSize:22,fontVariantNumeric:"tabular-nums",fontWeight:800,color:th.gold}}>{r.v}</div>
            </div>
          ))}
          {!result.err&&<button onClick={shareResult} style={{...S.outlineBtn(th.purple),width:"100%",marginTop:14,fontSize:12}}>↗ Share result</button>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOL 3 — INTERVAL TIMER
// ═══════════════════════════════════════════════════════════════════════════════
function IntervalTimer({ onBack }) {
  const [workI,setWorkI]   = useState("0:45");
  const [restI,setRestI]   = useState("0:15");
  const [repsI,setRepsI]   = useState("8");
  const [phase,setPhase]   = useState("idle");
  const [repsDone,setRepsDone] = useState(0);
  const [secsLeft,setSecsLeft] = useState(0);
  const [audioOk,setAudioOk]  = useState(false);

  const totalReps=parseInt(repsI)||0, workSec=parseDur(workI)||0, restSec=parseDur(restI)||0;
  const timerRef=useRef(null), stRef=useRef({phase:"idle",secsLeft:0,repsDone:0});

  const tick = useCallback(()=>{
    const st=stRef.current;
    if (st.secsLeft>1) { st.secsLeft--; setSecsLeft(st.secsLeft); if(st.secsLeft<=3) beep(660,0.08,0.2); }
    else {
      if (st.phase==="work") {
        beepEnd();
        if (st.repsDone+1>=totalReps) { st.phase="done"; st.secsLeft=0; setPhase("done"); setSecsLeft(0); clearInterval(timerRef.current); }
        else { st.repsDone++; st.phase="rest"; st.secsLeft=restSec; setRepsDone(st.repsDone); setPhase("rest"); setSecsLeft(restSec); }
      } else { beepStart(); st.phase="work"; st.secsLeft=workSec; setPhase("work"); setSecsLeft(workSec); }
    }
  },[totalReps,workSec,restSec]);

  const start=()=>{ if(!audioOk) return; stRef.current={phase:"work",secsLeft:workSec,repsDone:0}; setPhase("work"); setSecsLeft(workSec); setRepsDone(0); beepStart(); clearInterval(timerRef.current); timerRef.current=setInterval(tick,1000); };
  const stop=()=>{ clearInterval(timerRef.current); stRef.current={phase:"idle",secsLeft:0,repsDone:0}; setPhase("idle"); setSecsLeft(0); setRepsDone(0); };
  useEffect(()=>{ if(phase!=="idle"&&phase!=="done") { clearInterval(timerRef.current); timerRef.current=setInterval(tick,1000); } return()=>clearInterval(timerRef.current); },[tick]);

  const isWork=phase==="work", ringClr=isWork?th.green:th.accent, totalSec=isWork?workSec:restSec;
  const progress=totalSec>0?secsLeft/totalSec:0, r=80, circ=2*Math.PI*r;

  const numIn=(lbl,val,set)=>(<div style={{flex:1}}><div style={{...S.lbl(),marginBottom:6}}>{lbl}</div><input value={val} onChange={e=>set(e.target.value)} placeholder="mm:ss" style={{...S.input,width:"100%",textAlign:"center",fontSize:18,fontWeight:700}}/></div>);

  return (
    <div style={S.page}>
      <button onClick={()=>{stop();onBack();}} style={S.backBtn}>← Toolbox</button>
      <div style={S.head(th.green)}>Coach's Toolbox</div>
      <div style={S.title}>Interval Timer</div>
      <div style={{...S.sub,marginBottom:24}}>Set work, rest, and reps then go</div>
      {!audioOk&&<button onClick={()=>{beep(1,0.001,0.001);setAudioOk(true);}} style={{...S.primaryBtn(th.surface,th.green),border:`1px solid ${th.green}`,marginBottom:16}}>🔊 Tap to enable audio beeps</button>}
      {phase==="idle"&&(<>
        <div style={{display:"flex",gap:10,marginBottom:16}}>{numIn("Work (mm:ss)",workI,setWorkI)}{numIn("Rest (mm:ss)",restI,setRestI)}</div>
        <div style={{marginBottom:20}}><div style={{...S.lbl(),marginBottom:6}}>Reps</div><input type="number" value={repsI} onChange={e=>setRepsI(e.target.value)} style={{...S.input,width:"100%",textAlign:"center",fontSize:18,fontWeight:700}}/></div>
        <div style={{marginBottom:16,padding:"10px 14px",background:th.surface,borderRadius:10,border:`1px solid ${th.border}`,fontSize:12,color:th.muted}}>Total: {fmtSec((workSec+restSec)*totalReps)} · Work: {fmtSec(workSec*totalReps)} · Rest: {fmtSec(restSec*totalReps)}</div>
        <button onClick={start} disabled={!audioOk||workSec===0||totalReps===0} style={{...S.primaryBtn(th.green,th.bg),opacity:audioOk&&workSec>0&&totalReps>0?1:0.4}}>▶ Start</button>
      </>)}
      {(phase==="work"||phase==="rest")&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
          <div style={{position:"relative",width:200,height:200}}>
            <svg width="200" height="200" style={{transform:"rotate(-90deg)"}}>
              <circle className="ring-bg" cx="100" cy="100" r={r} strokeWidth="10"/>
              <circle className="ring-fg" cx="100" cy="100" r={r} strokeWidth="10" stroke={ringClr} strokeDasharray={circ} strokeDashoffset={circ*(1-progress)}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:11,letterSpacing:3,color:ringClr,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{isWork?"WORK":"REST"}</div>
              <div style={{fontSize:46,fontVariantNumeric:"tabular-nums",fontWeight:800,color:"#fff",lineHeight:1}}>{fmtSec(secsLeft)}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
            {Array.from({length:totalReps}).map((_,i)=>(
              <div key={i} style={{width:24,height:24,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:i<repsDone?th.green:i===repsDone&&isWork?ringClr+"44":th.surface,border:`1px solid ${i<repsDone?th.green:i===repsDone?ringClr:th.border}`,fontSize:9,color:i<repsDone?th.bg:th.muted,fontWeight:700}}>{i+1}</div>
            ))}
          </div>
          <div style={{fontSize:13,color:th.muted,fontWeight:500}}>Rep {repsDone+(isWork?1:1)} of {totalReps}</div>
          <div style={{background:isWork?th.greenDim:th.accentDim,borderRadius:12,padding:"10px 20px",border:`1px solid ${ringClr}44`,textAlign:"center",width:"100%"}}>
            <div style={{fontSize:11,color:ringClr,letterSpacing:2,fontWeight:700}}>{isWork?`REST IN ${fmtSec(secsLeft)}`:`WORK IN ${fmtSec(secsLeft)}`}</div>
          </div>
          <button onClick={stop} style={{...S.outlineBtn(th.red),width:"100%"}}>■ Stop</button>
        </div>
      )}
      {phase==="done"&&(
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:12}}>✅</div>
          <div style={{fontSize:22,fontWeight:800,color:th.green,marginBottom:8}}>Session Complete!</div>
          <div style={{fontSize:13,color:th.muted,marginBottom:28}}>{totalReps} reps · {fmtSec(workSec*totalReps)} work · {fmtSec(restSec*totalReps)} rest</div>
          <button onClick={stop} style={S.primaryBtn(th.green,th.bg)}>↩ Reset</button>
        </div>
      )}
    </div>
  );
}

// TOOL 4 — BRICK LOGGER (with athlete profiles + save + share)
// ═══════════════════════════════════════════════════════════════════════════════
function BrickLogger({ onBack, store }) {
  const { athletes, addAthlete, saveResult } = store;
  const [rows, setRows]   = useState([{uid:uid(),athlete:{id:null,name:""}}]);
  const [phase,setPhase]  = useState("setup");
  const [logs,setLogs]    = useState({});
  const [saved,setSaved]  = useState({});
  const wallRef=useRef(null), ticker=useRef(null);
  const [now,setNow]      = useState(null);
  const elapsed = () => now&&wallRef.current ? now-wallRef.current : 0;

  const addRow    = () => setRows(p=>[...p,{uid:uid(),athlete:{id:null,name:""}}]);
  const removeRow = u => setRows(p=>p.filter(r=>r.uid!==u));
  const setAthlete= (u,a)=>setRows(p=>p.map(r=>r.uid===u?{...r,athlete:a}:r));

  const startSession=()=>{ wallRef.current=performance.now(); ticker.current=setInterval(()=>setNow(performance.now()),50); setPhase("session"); };
  const endSession  =()=>{ clearInterval(ticker.current); setPhase("results"); };
  const reset       =()=>{ clearInterval(ticker.current); setRows([{uid:uid(),athlete:{id:null,name:""}}]); setLogs({}); setNow(null); wallRef.current=null; setSaved({}); setPhase("setup"); };
  const mark        =(u,key)=>setLogs(p=>({...p,[u]:{...(p[u]||{}),[key]:elapsed()}}));
  const getDerived  =u=>{ const l=logs[u]||{}; return {...l,t1:l.t1s!=null&&l.t1f!=null?l.t1f-l.t1s:null,t2:l.t2s!=null&&l.t2f!=null?l.t2f-l.t2s:null}; };

  const ready = rows.length>0&&rows.every(r=>r.athlete?.name?.trim());

  const tBtn=(fg,bg,label,solid,onClick)=>(
    <button onClick={onClick} style={{padding:"7px 14px",background:solid?fg:bg,color:solid?th.bg:fg,border:`1px solid ${fg}`,borderRadius:8,fontSize:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>{label}</button>
  );

  const doSave = (r) => {
    const d=getDerived(r.uid);
    let aId=r.athlete.id;
    if (!aId&&r.athlete.name?.trim()) { const c=addAthlete(r.athlete.name); aId=c.id; }
    if (aId) saveResult(aId,"brick",{t1:d.t1,t2:d.t2});
    setSaved(p=>({...p,[r.uid]:true}));
  };

  const doShare = (r) => {
    const d=getDerived(r.uid);
    const lines=[`🚴 Brick Session — ${r.athlete.name}`,`T1 (Swim→Bike): ${fmtMs(d.t1)}`,`T2 (Bike→Run):  ${fmtMs(d.t2)}`,d.t1&&d.t2?`Total transitions: ${fmtMs(d.t1+d.t2)}`:"","Coach's Toolbox · tools.stevebarbour.com"];
    shareOrCopy(lines.join("\n"),`${r.athlete.name} Brick Result`);
  };

  if (phase==="setup") return (
    <div style={S.page}>
      <button onClick={onBack} style={S.backBtn}>← Toolbox</button>
      <div style={S.head(th.orange)}>Coach's Toolbox</div>
      <div style={S.title}>Brick Logger</div>
      <div style={{...S.sub,marginBottom:24}}>Log T1 and T2 transition times per athlete</div>
      <div style={{...S.lbl(),marginBottom:10}}>Athletes</div>
      {rows.map(r=>(
        <div key={r.uid} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <AthletePicker athletes={athletes} value={r.athlete} onChange={a=>setAthlete(r.uid,a)} placeholder="Athlete name"/>
          {rows.length>1&&<button onClick={()=>removeRow(r.uid)} style={{background:"none",border:"none",color:th.red,fontSize:20,cursor:"pointer",padding:"0 4px",fontFamily:"inherit"}}>×</button>}
        </div>
      ))}
      <button onClick={addRow} style={{...S.ghostBtn,marginBottom:20}}>+ Add Athlete</button>
      <button onClick={startSession} disabled={!ready} style={{...S.primaryBtn(th.orange,th.bg),opacity:ready?1:0.4}}>Start Session</button>
    </div>
  );

  if (phase==="session") return (
    <div style={S.page}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={S.head(th.orange)}>Session Live</div>
        <div style={{fontSize:44,fontVariantNumeric:"tabular-nums",color:th.orange,fontWeight:800,lineHeight:1}}>{fmtMs(elapsed())}</div>
      </div>
      {rows.map(r=>{
        const l=logs[r.uid]||{}, d=getDerived(r.uid);
        const done=d.t1!=null&&d.t2!=null;
        const ph1=!l.t1s?"start":!l.t1f?"stop":"done";
        const ph2=!l.t2s?"start":!l.t2f?"stop":"done";
        return (
          <div key={r.uid} style={S.card(done,th.orange)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:15}}>{r.athlete.name}</span>
              {done&&<span style={{fontSize:10,color:th.orange,letterSpacing:2,fontWeight:700}}>DONE ✓</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <div style={{fontSize:10,color:th.accent,letterSpacing:2,fontWeight:700,width:22}}>T1</div>
              <span style={{fontSize:9,color:th.muted}}>Swim→Bike</span>
              {ph1==="start"&&tBtn(th.accent,th.accentDim,"▶ IN",false,()=>mark(r.uid,"t1s"))}
              {ph1==="stop" &&<><span style={{fontSize:16,fontVariantNumeric:"tabular-nums",color:th.accent,fontWeight:800}}>{fmtMs(elapsed()-l.t1s)}</span>{tBtn(th.accent,th.accentDim,"■ OUT",true,()=>mark(r.uid,"t1f"))}</>}
              {ph1==="done" &&<span style={{fontSize:15,fontVariantNumeric:"tabular-nums",color:th.accent,fontWeight:700}}>{fmtMs(d.t1)}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:10,color:th.purple,letterSpacing:2,fontWeight:700,width:22}}>T2</div>
              <span style={{fontSize:9,color:th.muted}}>Bike→Run</span>
              {ph2==="start"&&tBtn(th.purple,th.purpleDim,"▶ IN",false,()=>mark(r.uid,"t2s"))}
              {ph2==="stop" &&<><span style={{fontSize:16,fontVariantNumeric:"tabular-nums",color:th.purple,fontWeight:800}}>{fmtMs(elapsed()-l.t2s)}</span>{tBtn(th.purple,th.purpleDim,"■ OUT",true,()=>mark(r.uid,"t2f"))}</>}
              {ph2==="done" &&<span style={{fontSize:15,fontVariantNumeric:"tabular-nums",color:th.purple,fontWeight:700}}>{fmtMs(d.t2)}</span>}
            </div>
          </div>
        );
      })}
      <button onClick={endSession} style={{...S.primaryBtn(th.surfaceAlt,th.orange),border:`1px solid ${th.orange}`,marginTop:4}}>View Results</button>
    </div>
  );

  // Results
  const allD=rows.map(r=>({...r,...getDerived(r.uid)}));
  const fastT1=(()=>{ const ts=allD.filter(a=>a.t1!=null).map(a=>a.t1); return ts.length?Math.min(...ts):null; })();
  const fastT2=(()=>{ const ts=allD.filter(a=>a.t2!=null).map(a=>a.t2); return ts.length?Math.min(...ts):null; })();

  return (
    <div style={S.page}>
      <div style={S.head(th.orange)}>Results</div>
      <div style={{...S.title,marginBottom:20}}>Brick Session</div>
      {allD.map(r=>(
        <div key={r.uid} style={{background:th.surface,border:`1px solid ${th.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>{r.athlete.name}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            <div style={{...S.splitBox,borderColor:r.t1===fastT1&&fastT1?th.gold:th.border}}>
              <div style={S.lbl(th.accent)}>T1 Swim→Bike</div>
              <div style={{fontVariantNumeric:"tabular-nums",fontSize:15,fontWeight:600}}>{r.t1!=null?fmtMs(r.t1):"—"}</div>
              {r.t1===fastT1&&fastT1&&<div style={{fontSize:9,color:th.gold,fontWeight:700,marginTop:2}}>FASTEST</div>}
            </div>
            <div style={{...S.splitBox,borderColor:r.t2===fastT2&&fastT2?th.gold:th.border}}>
              <div style={S.lbl(th.purple)}>T2 Bike→Run</div>
              <div style={{fontVariantNumeric:"tabular-nums",fontSize:15,fontWeight:600}}>{r.t2!=null?fmtMs(r.t2):"—"}</div>
              {r.t2===fastT2&&fastT2&&<div style={{fontSize:9,color:th.gold,fontWeight:700,marginTop:2}}>FASTEST</div>}
            </div>
            {r.t1!=null&&r.t2!=null&&<div style={{...S.splitBox,borderColor:th.orange}}><div style={S.lbl(th.orange)}>Total T</div><div style={{fontVariantNumeric:"tabular-nums",fontSize:15,fontWeight:700,color:th.orange}}>{fmtMs(r.t1+r.t2)}</div></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>doSave(r)} disabled={saved[r.uid]} style={{...S.outlineBtn(saved[r.uid]?th.green:th.orange),flex:1,fontSize:12,padding:"8px 10px"}}>
              {saved[r.uid]?"✓ Saved":"💾 Save to profile"}
            </button>
            <button onClick={()=>doShare(r)} style={{...S.outlineBtn(th.purple),flex:1,fontSize:12,padding:"8px 10px"}}>↗ Share</button>
          </div>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginTop:20}}>
        <button onClick={reset}  style={{...S.outlineBtn(th.orange),flex:1}}>↩ New Session</button>
        <button onClick={onBack} style={{...S.outlineBtn(th.muted), flex:1}}>⌂ Toolbox</button>
      </div>
    </div>
  );
}

// TOOL 5 — TIME TRIAL
// ═══════════════════════════════════════════════════════════════════════════════
const TT_DISCIPLINES = [
  { id:"run",  label:"Run",  icon:"🏃", units:["km","mi"],  paceUnit:"/km",   paceUnit2:"/mi",   distDef:"5"  },
  { id:"bike", label:"Bike", icon:"🚴", units:["km","mi"],  paceUnit:"km/h",  paceUnit2:"mph",   distDef:"40" },
  { id:"swim", label:"Swim", icon:"🏊", units:["m","yd"],   paceUnit:"/100m", paceUnit2:"/100y", distDef:"400"},
];

function calcTTPace(disc, distVal, distUnit, timeMs) {
  if (!timeMs || !distVal) return null;
  const dist = parseFloat(distVal);
  if (!dist || dist <= 0) return null;
  const secs = timeMs / 1000;

  if (disc === "bike") {
    // speed in selected unit
    const hrs = secs / 3600;
    const speed = dist / hrs;
    return `${speed.toFixed(1)} ${distUnit === 0 ? "km/h" : "mph"}`;
  } else if (disc === "swim") {
    // pace per 100m or 100yd
    const per100 = secs / (dist / 100);
    return `${fmtSec(per100)} /${distUnit === 0 ? "100m" : "100yd"}`;
  } else {
    // run pace per km or mile
    const perUnit = secs / dist;
    return `${fmtSec(perUnit)} /${distUnit === 0 ? "km" : "mi"}`;
  }
}

function TimeTrial({ onBack, store }) {
  const { athletes, addAthlete, saveResult } = store;

  const [phase, setPhase]     = useState("setup");
  const [disc, setDisc]       = useState("run");
  const [distVal, setDistVal] = useState("5");
  const [distUnit, setDistUnit] = useState(0); // index into units array
  const [rows, setRows]       = useState([{ uid:uid(), athlete:{id:null,name:""} }]);
  const [timing, setTiming]   = useState({}); // uid -> { startAt, finishAt }
  const [saved, setSaved]     = useState({});

  const wallRef = useRef(null), ticker = useRef(null);
  const [now, setNow] = useState(null);
  const elapsed = () => now && wallRef.current ? now - wallRef.current : 0;

  const d = TT_DISCIPLINES.find(x => x.id === disc);

  const addRow    = () => setRows(p => [...p, { uid:uid(), athlete:{id:null,name:""} }]);
  const removeRow = u  => setRows(p => p.filter(r => r.uid !== u));
  const setAth    = (u,a) => setRows(p => p.map(r => r.uid===u ? {...r, athlete:a} : r));

  const startSession = () => {
    wallRef.current = performance.now();
    ticker.current  = setInterval(() => setNow(performance.now()), 50);
    setPhase("racing");
  };
  const endSession = () => { clearInterval(ticker.current); setPhase("results"); };
  const reset = () => {
    clearInterval(ticker.current);
    setRows([{uid:uid(),athlete:{id:null,name:""}}]);
    setTiming({}); setSaved({}); setNow(null); wallRef.current = null;
    setPhase("setup");
  };

  const mark = (u, key) => setTiming(p => ({ ...p, [u]: { ...(p[u]||{}), [key]: elapsed() } }));

  const getTime = u => {
    const t = timing[u] || {};
    return t.startAt!=null && t.finishAt!=null ? t.finishAt - t.startAt : null;
  };

  const ready = rows.length > 0 && rows.every(r => r.athlete?.name?.trim()) && parseFloat(distVal) > 0;

  const aBtn = (fg, bg, solid) => ({
    padding:"9px 18px", background:solid?fg:bg, color:solid?th.bg:fg,
    border:`1px solid ${fg}`, borderRadius:8, fontSize:13, fontWeight:700,
    fontFamily:"inherit", cursor:"pointer", flexShrink:0,
  });

  const doSave = r => {
    const timeMs = getTime(r.uid);
    const pace   = calcTTPace(disc, distVal, distUnit, timeMs);
    let aId = r.athlete.id;
    if (!aId && r.athlete.name?.trim()) { const c = addAthlete(r.athlete.name); aId = c.id; }
    if (aId) saveResult(aId, "tt", { disc, dist:distVal, unit:d.units[distUnit], timeMs, pace });
    setSaved(p => ({...p, [r.uid]:true}));
  };

  const doShare = r => {
    const timeMs = getTime(r.uid);
    const pace   = calcTTPace(disc, distVal, distUnit, timeMs);
    const lines  = [
      `${d.icon} Time Trial — ${r.athlete.name}`,
      `${disc.charAt(0).toUpperCase()+disc.slice(1)} ${distVal}${d.units[distUnit]}`,
      `Time: ${fmtMs(timeMs)}`,
      pace ? `Pace: ${pace}` : "",
      "",
      "Coach's Toolbox · tools.stevebarbour.com",
    ].filter(l => l !== undefined);
    shareOrCopy(lines.join("\n"), `${r.athlete.name} TT Result`);
  };

  // ── SETUP ─────────────────────────────────────────────────────────────────
  if (phase === "setup") return (
    <div style={S.page}>
      <button onClick={onBack} style={S.backBtn}>← Toolbox</button>
      <div style={S.head(th.purple)}>Coach's Toolbox</div>
      <div style={S.title}>Time Trial</div>
      <div style={{...S.sub, marginBottom:24}}>Staggered starts, independent timing per athlete</div>

      {/* Discipline picker */}
      <div style={{...S.lbl(), marginBottom:8}}>Discipline</div>
      <div style={{display:"flex", gap:8, marginBottom:20}}>
        {TT_DISCIPLINES.map(di => (
          <button key={di.id} onClick={() => { setDisc(di.id); setDistVal(di.distDef); setDistUnit(0); }}
            style={{flex:1, padding:"10px 0", fontFamily:"inherit", fontSize:12, fontWeight:700,
              cursor:"pointer", borderRadius:10,
              background: disc===di.id ? th.purple : "none",
              color: disc===di.id ? th.bg : th.muted,
              border: disc===di.id ? "none" : `1px solid ${th.border}`,
            }}>
            {di.icon} {di.label}
          </button>
        ))}
      </div>

      {/* Distance */}
      <div style={{...S.lbl(), marginBottom:8}}>Distance</div>
      <div style={{display:"flex", gap:8, marginBottom:20}}>
        <input type="number" value={distVal} onChange={e => setDistVal(e.target.value)}
          placeholder={d.distDef} style={{...S.input, maxWidth:110}}/>
        <select value={distUnit} onChange={e => setDistUnit(+e.target.value)}
          style={{...S.input, flex:"none", width:80}}>
          {d.units.map((u,i) => <option key={u} value={i}>{u}</option>)}
        </select>
      </div>

      {/* Athletes */}
      <div style={{...S.lbl(), marginBottom:8}}>Athletes</div>
      {rows.map(r => (
        <div key={r.uid} style={{display:"flex", gap:8, marginBottom:8, alignItems:"center"}}>
          <AthletePicker athletes={athletes} value={r.athlete} onChange={a => setAth(r.uid, a)} placeholder="Athlete name"/>
          {rows.length > 1 && (
            <button onClick={() => removeRow(r.uid)} style={{background:"none",border:"none",color:th.red,fontSize:20,cursor:"pointer",padding:"0 4px",fontFamily:"inherit"}}>×</button>
          )}
        </div>
      ))}
      <button onClick={addRow} style={{...S.ghostBtn, marginBottom:20}}>+ Add Athlete</button>
      <button onClick={startSession} disabled={!ready}
        style={{...S.primaryBtn(th.purple, th.bg), opacity:ready?1:0.4}}>
        Start Session
      </button>
    </div>
  );

  // ── RACING ────────────────────────────────────────────────────────────────
  if (phase === "racing") {
    const allDone = rows.every(r => getTime(r.uid) != null);
    return (
      <div style={S.page}>
        <div style={{textAlign:"center", marginBottom:20}}>
          <div style={S.head(th.purple)}>
            {d.icon} {disc.charAt(0).toUpperCase()+disc.slice(1)} {distVal}{d.units[distUnit]} Time Trial
          </div>
          <div style={{fontSize:44, fontVariantNumeric:"tabular-nums", color:th.purple, fontWeight:800, lineHeight:1}}>
            {fmtMs(elapsed())}
          </div>
        </div>

        {rows.map(r => {
          const t    = timing[r.uid] || {};
          const done = getTime(r.uid) != null;
          const ph   = !t.startAt ? "start" : !t.finishAt ? "running" : "done";

          return (
            <div key={r.uid} style={S.card(done, th.purple)}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
                <span style={{fontWeight:700, fontSize:15}}>{r.athlete.name}</span>
                {done && <span style={{fontSize:10, color:th.purple, letterSpacing:2, fontWeight:700}}>DONE ✓</span>}
              </div>

              <div style={{display:"flex", alignItems:"center", gap:10, flexWrap:"wrap"}}>
                {ph === "start" && (
                  <button onClick={() => mark(r.uid, "startAt")} style={aBtn(th.purple, th.purpleDim, false)}>
                    ▶ START
                  </button>
                )}
                {ph === "running" && (
                  <>
                    <button onClick={() => mark(r.uid, "finishAt")} style={aBtn(th.purple, th.purpleDim, true)}>
                      ■ FINISH
                    </button>
                    <span style={{fontSize:20, fontVariantNumeric:"tabular-nums", color:th.purple, fontWeight:800, letterSpacing:1}}>
                      {fmtMs(elapsed() - t.startAt)}
                    </span>
                  </>
                )}
                {ph === "done" && (
                  <span style={{fontSize:18, fontVariantNumeric:"tabular-nums", color:th.purple, fontWeight:700}}>
                    {fmtMs(getTime(r.uid))}
                    {calcTTPace(disc, distVal, distUnit, getTime(r.uid)) &&
                      <span style={{fontSize:12, color:th.muted, fontWeight:500, marginLeft:8}}>
                        {calcTTPace(disc, distVal, distUnit, getTime(r.uid))}
                      </span>
                    }
                  </span>
                )}
              </div>
            </div>
          );
        })}

        <button onClick={endSession}
          style={{...S.primaryBtn(th.surfaceAlt, th.purple), border:`1px solid ${th.purple}`, marginTop:8}}>
          {allDone ? "View Results" : "End Session Early"}
        </button>
      </div>
    );
  }

  // ── RESULTS ───────────────────────────────────────────────────────────────
  const ranked = [...rows]
    .map(r => ({ ...r, timeMs: getTime(r.uid) }))
    .sort((a,b) => {
      if (a.timeMs == null && b.timeMs == null) return 0;
      if (a.timeMs == null) return 1;
      if (b.timeMs == null) return -1;
      return a.timeMs - b.timeMs;
    });

  return (
    <div style={S.page}>
      <div style={S.head(th.purple)}>Results</div>
      <div style={{...S.title, marginBottom:4}}>Time Trial</div>
      <div style={{fontSize:12, color:th.muted, marginBottom:20}}>
        {d.icon} {disc.charAt(0).toUpperCase()+disc.slice(1)} · {distVal}{d.units[distUnit]}
      </div>

      {ranked.map((r, i) => {
        const pace = calcTTPace(disc, distVal, distUnit, r.timeMs);
        const isFirst = i === 0 && r.timeMs != null;
        return (
          <div key={r.uid} style={{
            background: th.surface,
            border: `1px solid ${isFirst ? th.gold : th.border}`,
            borderRadius:12, padding:"14px 16px", marginBottom:10,
          }}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <div style={{
                  width:26, height:26, borderRadius:8,
                  background: isFirst ? th.gold : th.surfaceAlt,
                  color: isFirst ? th.bg : th.muted,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:12, fontWeight:800,
                }}>
                  {i+1}
                </div>
                <span style={{fontWeight:700, fontSize:16}}>{r.athlete.name}</span>
                {isFirst && <span style={{fontSize:10, color:th.gold, fontWeight:700, letterSpacing:1}}>FASTEST</span>}
              </div>
            </div>

            <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:12}}>
              <div style={S.splitBox}>
                <div style={S.lbl(th.purple)}>Time</div>
                <div style={{fontVariantNumeric:"tabular-nums", fontSize:18, fontWeight:700, color:th.purple}}>
                  {r.timeMs != null ? fmtMs(r.timeMs) : "—"}
                </div>
              </div>
              {pace && (
                <div style={{...S.splitBox, borderColor:th.purple}}>
                  <div style={S.lbl(th.purple)}>Pace / Speed</div>
                  <div style={{fontVariantNumeric:"tabular-nums", fontSize:15, fontWeight:600}}>{pace}</div>
                </div>
              )}
              {i > 0 && ranked[0].timeMs != null && r.timeMs != null && (
                <div style={S.splitBox}>
                  <div style={S.lbl(th.muted)}>Gap</div>
                  <div style={{fontVariantNumeric:"tabular-nums", fontSize:15, fontWeight:600, color:th.muted}}>
                    +{fmtMs(r.timeMs - ranked[0].timeMs)}
                  </div>
                </div>
              )}
            </div>

            <div style={{display:"flex", gap:8}}>
              <button onClick={() => doSave(r)} disabled={saved[r.uid]}
                style={{...S.outlineBtn(saved[r.uid] ? th.green : th.purple), flex:1, fontSize:12, padding:"8px 10px"}}>
                {saved[r.uid] ? "✓ Saved" : "💾 Save to profile"}
              </button>
              <button onClick={() => doShare(r)}
                style={{...S.outlineBtn(th.muted), flex:1, fontSize:12, padding:"8px 10px"}}>
                ↗ Share
              </button>
            </div>
          </div>
        );
      })}

      <div style={{display:"flex", gap:8, marginTop:20}}>
        <button onClick={reset}  style={{...S.outlineBtn(th.purple), flex:1}}>↩ New Session</button>
        <button onClick={onBack} style={{...S.outlineBtn(th.muted),  flex:1}}>⌂ Toolbox</button>
      </div>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const store = useAthletes();
  const [screen, setScreen] = useState("home"); // home | athletes | tool:xxx

  useEffect(()=>{
    const on=()=>{document.getElementById("offline-banner").style.display="none";};
    const off=()=>{document.getElementById("offline-banner").style.display="block";};
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);

  const back = () => setScreen("home");

  if (screen==="athletes")      return <AthletesScreen  onBack={back} store={store}/>;
  if (screen==="tool:css")      return <CSSTimer         onBack={back} store={store}/>;
  if (screen==="tool:tt")       return <TimeTrial        onBack={back} store={store}/>;
  if (screen==="tool:pace")     return <PaceCalculator   onBack={back}/>;
  if (screen==="tool:interval") return <IntervalTimer    onBack={back}/>;
  if (screen==="tool:brick")    return <BrickLogger      onBack={back} store={store}/>;

  return <HomeScreen
    onLaunch={id=>setScreen(`tool:${id}`)}
    onAthletes={()=>setScreen("athletes")}
    store={store}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => { navigator.serviceWorker.register("/sw.js").catch(()=>{}); });
  }
</script>
</body>
